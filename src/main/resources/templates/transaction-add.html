<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>SmartSpend | Add Transaction</title>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {

			background: linear-gradient(135deg, #0F4C3A, #166534);
			min-height: 100vh;

			display: flex;
			justify-content: center;
			align-items: center;

			overflow: hidden;

		}

		/* Floating Background */

		.circle {

			position: absolute;

			border-radius: 50%;

			background: rgba(255, 255, 255, .08);

			animation: float 8s infinite ease-in-out;

		}

		.circle:nth-child(1) {

			width: 220px;
			height: 220px;

			top: -80px;
			left: -80px;

		}

		.circle:nth-child(2) {

			width: 170px;
			height: 170px;

			bottom: -60px;
			right: -60px;

			animation-delay: 2s;

		}

		.circle:nth-child(3) {

			width: 90px;
			height: 90px;

			top: 18%;
			right: 22%;

			animation-delay: 4s;

		}

		@keyframes float {

			50% {

				transform: translateY(-30px);

			}

		}

		/* Card */

		.card {

			width: 500px;

			background: white;

			padding: 40px;

			border-radius: 22px;

			box-shadow: 0 25px 60px rgba(0, 0, 0, .25);

			animation: fade .8s;

			z-index: 10;

		}

		@keyframes fade {

			from {

				opacity: 0;
				transform: translateY(35px);

			}

			to {

				opacity: 1;
				transform: translateY(0);

			}

		}

		.logo {

			font-size: 60px;

			text-align: center;

		}

		h2 {

			text-align: center;

			color: #0F4C3A;

			margin-top: 10px;

		}

		.subtitle {

			text-align: center;

			color: #6b7280;

			margin-bottom: 30px;

		}

		.form-group {

			margin-bottom: 18px;

		}

		label {

			display: block;

			margin-bottom: 8px;

			font-weight: 600;

			color: #374151;

		}

		.form-control,
		.form-select {

			width: 100%;

			padding: 14px;

			border-radius: 12px;

			border: 1px solid #d1d5db;

			outline: none;

			transition: .3s;

			font-size: 15px;

		}

		.form-control:focus,
		.form-select:focus {

			border-color: #22C55E;

			box-shadow: 0 0 12px rgba(34, 197, 94, .3);

		}

		.btn-save {

			width: 100%;

			padding: 15px;

			background: #16A34A;

			color: white;

			border: none;

			border-radius: 12px;

			font-size: 16px;

			font-weight: 600;

			cursor: pointer;

			transition: .35s;

		}

		.btn-save:hover {

			background: #15803D;

			transform: translateY(-3px);

			box-shadow: 0 15px 30px rgba(22, 163, 74, .35);

		}

		.footer {

			margin-top: 25px;

			text-align: center;

			font-size: 12px;

			color: #9ca3af;

		}

		@media(max-width:550px) {

			.card {

				width: 92%;

				padding: 30px;

			}

		}
	</style>

</head>

<body>

	<div class="circle"></div>
	<div class="circle"></div>
	<div class="circle"></div>

	<div class="card">

		<div class="logo">

			💳

		</div>

		<h2>Add Transaction</h2>

		<p class="subtitle">

			Record your income or expense to keep your finances up to date.

		</p>

		<form th:action="@{/savetransaction}" th:object="${transaction}" method="post">

			<div class="form-group">

				<label>Amount</label>

				<input type="number" class="form-control" th:field="*{amount}" placeholder="Enter amount">

			</div>

			<div class="form-group">

				<label>Category</label>

				<select class="form-select" th:field="*{category}">

					<option value="">Select Category</option>

					<option th:each="cat : ${categories}" th:value="${cat.catId}" th:text="${cat.name}">
					</option>

				</select>

			</div>

			<div class="form-group">

				<label>Date</label>

				<input type="date" class="form-control" th:field="*{date}">

			</div>

			<div class="form-group">

				<label>Note</label>

				<input type="text" class="form-control" th:field="*{note}" placeholder="Write a short note">

			</div>

			<button type="submit" class="btn-save">

				💾 Save Transaction

			</button>

		</form>

		<div class="footer">

			© 2026 SmartSpend • Every transaction brings you closer to better financial planning.

		</div>

	</div>

</body>

</html>
