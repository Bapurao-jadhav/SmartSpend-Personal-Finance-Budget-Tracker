<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SmartSpend | Budget Planner</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: Poppins, sans-serif
		}

		body {
			background: linear-gradient(135deg, #0f4c3a, #166534);
			min-height: 100vh;
			padding: 40px;
			overflow-x: hidden
		}

		.bg {
			position: fixed;
			border-radius: 50%;
			background: rgba(255, 255, 255, .08);
			animation: f 8s ease-in-out infinite;
			z-index: 0
		}

		.b1 {
			width: 220px;
			height: 220px;
			left: -80px;
			top: -60px
		}

		.b2 {
			width: 180px;
			height: 180px;
			right: -70px;
			bottom: -70px;
			animation-delay: 2s
		}

		@keyframes f {
			50% {
				transform: translateY(-25px) translateX(15px)
			}
		}

		.wrapper {
			max-width: 1100px;
			margin: auto;
			position: relative;
			z-index: 2
		}

		.card {
			background: #fff;
			border-radius: 22px;
			box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
			padding: 35px;
			animation: up .8s
		}

		@keyframes up {
			from {
				opacity: 0;
				transform: translateY(30px)
			}

			to {
				opacity: 1;
				transform: none
			}
		}

		.header {
			text-align: center;
			margin-bottom: 30px
		}

		.header h1 {
			color: #0f4c3a
		}

		.header p {
			color: #6b7280
		}

		.stats {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 18px;
			margin-bottom: 30px
		}

		.stat {
			background: #eef8f1;
			border-left: 5px solid #22c55e;
			border-radius: 15px;
			padding: 18px
		}

		.stat h3 {
			color: #166534
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 30px
		}

		label {
			display: block;
			margin: 10px 0 6px;
			font-weight: 600;
			color: #374151
		}

		input,
		select {
			width: 100%;
			padding: 13px;
			border: 1px solid #d1d5db;
			border-radius: 12px;
			transition: .3s
		}

		input:focus,
		select:focus {
			outline: none;
			border-color: #22c55e;
			box-shadow: 0 0 10px rgba(34, 197, 94, .25)
		}

		button {
			width: 100%;
			margin-top: 18px;
			background: #16a34a;
			color: #fff;
			border: none;
			padding: 15px;
			border-radius: 12px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: .3s
		}

		button:hover {
			background: #15803d;
			transform: translateY(-3px)
		}

		.table-card {
			background: #f8fafc;
			border-radius: 15px;
			padding: 18px
		}

		table {
			width: 100%;
			border-collapse: collapse
		}

		th {
			background: #166534;
			color: #fff
		}

		th,
		td {
			padding: 12px;
			text-align: center
		}

		tr:nth-child(even) {
			background: #f2f2f2
		}

		tbody tr:hover {
			background: #dcfce7
		}

		@media(max-width:900px) {

			.stats,
			.grid {
				grid-template-columns: 1fr
			}

			body {
				padding: 15px
			}
		}
	</style>
</head>

<body>
	<div class="bg b1"></div>
	<div class="bg b2"></div>
	<div class="wrapper">
		<div class="card">
			<div class="header">
				<h1>💰 Budget Planner</h1>
				<p>Plan your monthly spending and stay within your financial goals.</p>
			</div>

			<div class="stats">
				<div class="stat">
					<h3>Monthly Budget</h3>
					<p>Set your planned spending.</p>
				</div>
				<div class="stat">
					<h3>Categories</h3>
					<p>Organize budgets by category.</p>
				</div>
				<div class="stat">
					<h3>Track Progress</h3>
					<p>Compare budget with expenses.</p>
				</div>
			</div>

			<div class="grid">
				<div>
					<form th:action="@{/saveBudget}" th:object="${budget}" method="post">

						<label>Monthly Budget</label>
						<input type="number" th:field="*{monthlyBudget}" placeholder="Enter budget amount">

						<label>Category</label>
						<select th:field="*{category}">
							<option value="">Select Category</option>
							<option th:each="cat : ${categories}" th:value="${cat.catId}" th:text="${cat.name}">
							</option>
						</select>

						<label>Month</label>
						<select class="form-select" th:field="*{month}">
						    <option value="1">January</option>
						    <option value="2">February</option>
						    <option value="3">March</option>
						    <option value="4">April</option>
						    <option value="5">May</option>
						    <option value="6">June</option>
						    <option value="7">July</option>
						    <option value="8">August</option>
						    <option value="9">September</option>
						    <option value="10">October</option>
						    <option value="11">November</option>
						    <option value="12">December</option>
						</select>

						<label>Year</label>
						<select class="form-select" th:field="*{year}">
						    <option value="2025">2025</option>
						    <option value="2026">2026</option>
						    <option value="2027">2027</option>
						    <option value="2028">2028</option>
						</select>

						<button type="submit">💾 Save Budget</button>
					</form>
				</div>

				<div class="table-card">
					<h3 style="margin-bottom:15px;color:#0f4c3a;">Existing Budgets</h3>
					<table>
						<thead>
							<tr>
								<th>Category</th>
								<th>Budget</th>
								<th>Month</th>
								<th>Year</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="b : ${existingbudgets}">
								<td th:text="${b.category.name}"></td>
								<td th:text="${b.monthlyBudget}"></td>
								<td th:text="${b.month}"></td>
								<td th:text="${b.year}"></td>
							</tr>
						</tbody>
					</table>
				</div>

			</div>
		</div>
	</div>
</body>

</html>
