<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>SmartSpend | My Transactions</title>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {

			background: linear-gradient(135deg, #0F4C3A, #166534);
			min-height: 100vh;
			padding: 40px;

		}

		/* Floating Background */

		.circle {

			position: fixed;

			border-radius: 50%;

			background: rgba(255, 255, 255, .08);

			animation: float 9s infinite ease-in-out;

			z-index: 0;

		}

		.circle:nth-child(1) {

			width: 220px;
			height: 220px;

			left: -70px;
			top: -70px;

		}

		.circle:nth-child(2) {

			width: 180px;
			height: 180px;

			right: -70px;
			bottom: -70px;

			animation-delay: 2s;

		}

		@keyframes float {

			50% {

				transform: translateY(-25px);

			}

		}

		.container {

			max-width: 1300px;

			margin: auto;

			position: relative;

			z-index: 10;

		}

		.card {

			background: white;

			padding: 35px;

			border-radius: 22px;

			box-shadow: 0 20px 50px rgba(0, 0, 0, .25);

			animation: fade .8s;

		}

		@keyframes fade {

			from {

				opacity: 0;
				transform: translateY(30px);

			}

			to {

				opacity: 1;
				transform: translateY(0);

			}

		}

		.header {

			display: flex;

			justify-content: space-between;

			align-items: center;

			flex-wrap: wrap;

			margin-bottom: 35px;

		}

		.header h2 {

			color: #0F4C3A;

		}

		.header p {

			color: #6b7280;

			margin-top: 8px;

		}

		/* Summary Cards */

		.summary {

			display: grid;

			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

			gap: 20px;

			margin-bottom: 35px;

		}

		.summary-card {

			background: #eef8f1;

			padding: 20px;

			border-left: 5px solid #22C55E;

			border-radius: 15px;

			transition: .3s;

		}

		.summary-card:hover {

			transform: translateY(-5px);

		}

		.summary-card h3 {

			color: #166534;

			margin-bottom: 8px;

		}

		.summary-card p {

			color: #6b7280;

			font-size: 14px;

		}

		/* Table */

		table {

			width: 100%;

			border-collapse: collapse;

		}

		thead {

			background: #166534;

			color: white;

		}

		th,
		td {

			padding: 15px;

			text-align: center;

		}

		tbody tr:nth-child(even) {

			background: #f9fafb;

		}

		tbody tr {

			transition: .3s;

		}

		tbody tr:hover {

			background: #dcfce7;

		}

		/* Badges */

		.type-income {

			background: #22C55E;

			color: white;

			padding: 6px 14px;

			border-radius: 30px;

			font-size: 13px;

		}

		.type-expense {

			background: #ef4444;

			color: white;

			padding: 6px 14px;

			border-radius: 30px;

			font-size: 13px;

		}

		/* Buttons */

		.btn {

			padding: 8px 16px;

			border-radius: 8px;

			text-decoration: none;

			font-size: 14px;

			font-weight: 500;

			display: inline-block;

			transition: .3s;

			border: none;

			cursor: pointer;

		}

		.btn-update {

			background: #2563eb;

			color: white;

		}

		.btn-update:hover {

			background: #1d4ed8;

			transform: translateY(-2px);

		}

		.btn-delete {

			background: #dc2626;

			color: white;

		}

		.btn-delete:hover {

			background: #b91c1c;

			transform: translateY(-2px);

		}

		.action-form {

			display: inline;

		}

		@media(max-width:900px) {

			table {

				display: block;

				overflow-x: auto;

			}

		}
	</style>

</head>

<body>

	<div class="circle"></div>
	<div class="circle"></div>

	<div class="container">

		<div class="card">

			<div class="header">

				<div>

					<h2>💳 My Transactions</h2>

					<p>Manage all your financial transactions from one place.</p>

				</div>

			</div>

			<div class="summary">

				<div class="summary-card">

					<h3>Total Records</h3>

					<p th:text="${#lists.size(transactions)} + ' Transactions'"></p>

				</div>

				<div class="summary-card">

					<h3>Income & Expenses</h3>

					<p>Track every financial activity.</p>

				</div>

				<div class="summary-card">

					<h3>SmartSpend</h3>

					<p>Stay organized and in control.</p>

				</div>

			</div>

			<table>

				<thead>

					<tr>

						<th>Amount</th>
						<th>Category</th>
						<th>Type</th>
						<th>Date</th>
						<th>Note</th>
						<th>Actions</th>

					</tr>

				</thead>

				<tbody>

					<tr th:each="tr : ${transactions}">

						<td>
							₹ <span th:text="${tr.amount}"></span>
						</td>

						<td th:text="${tr.category.name}"></td>

						<td>

							<span th:if="${tr.category.type == 'Income'}" class="type-income"
								th:text="${tr.category.type}">
							</span>

							<span th:if="${tr.category.type == 'Expense'}" class="type-expense"
								th:text="${tr.category.type}">
							</span>

						</td>

						<td th:text="${tr.date}"></td>

						<td th:text="${tr.note}"></td>

						<td>

							<form class="action-form" th:action="@{/transaction/update/{id}(id=${tr.trId})}"
								method="get">

								<button type="submit" class="btn btn-update">

									✏ Update

								</button>

							</form>

							<a th:href="@{/transaction/delete/{id}(id=${tr.trId})}" class="btn btn-delete"
								onclick="return confirm('Are you sure you want to delete this transaction?')">

								🗑 Delete

							</a>

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</body>

</html>
