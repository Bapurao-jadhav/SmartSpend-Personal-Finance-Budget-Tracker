<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>SmartSpend | Budget List</title>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {

			background: linear-gradient(135deg, #0F4C3A, #166534);
			min-height: 100vh;
			padding: 40px;
			overflow-x: hidden;

		}

		/* Floating circles */

		.circle {

			position: fixed;

			border-radius: 50%;

			background: rgba(255, 255, 255, .08);

			animation: float 9s infinite ease-in-out;

			z-index: 0;

		}

		.circle:nth-child(1) {

			width: 220px;
			height: 220px;

			top: -80px;
			left: -60px;

		}

		.circle:nth-child(2) {

			width: 170px;
			height: 170px;

			right: -60px;
			bottom: -60px;

			animation-delay: 2s;

		}

		@keyframes float {

			50% {

				transform: translateY(-25px);

			}

		}

		.container {

			max-width: 1200px;

			margin: auto;

			position: relative;

			z-index: 10;

		}

		.card {

			background: white;

			padding: 35px;

			border-radius: 20px;

			box-shadow: 0 20px 50px rgba(0, 0, 0, .25);

			animation: fade .8s;

		}

		@keyframes fade {

			from {

				opacity: 0;
				transform: translateY(30px);

			}

			to {

				opacity: 1;
				transform: translateY(0);

			}

		}

		.header {

			display: flex;

			justify-content: space-between;

			align-items: center;

			margin-bottom: 30px;

			flex-wrap: wrap;

		}

		.header h2 {

			color: #0F4C3A;

		}

		.header p {

			color: #6b7280;

			margin-top: 8px;

		}

		.table {

			width: 100%;

			border-collapse: collapse;

			overflow: hidden;

			border-radius: 15px;

		}

		.table thead {

			background: #166534;

			color: white;

		}

		.table th,
		.table td {

			padding: 16px;

			text-align: center;

		}

		.table tbody tr {

			transition: .3s;

		}

		.table tbody tr:nth-child(even) {

			background: #f9fafb;

		}

		.table tbody tr:hover {

			background: #dcfce7;

			transform: scale(1.01);

		}

		.delete-btn {

			background: #dc2626;

			color: white;

			padding: 8px 16px;

			border-radius: 8px;

			text-decoration: none;

			font-size: 14px;

			transition: .3s;

			display: inline-block;

		}

		.delete-btn:hover {

			background: #b91c1c;

			transform: translateY(-2px);

		}

		.badge {

			background: #22C55E;

			padding: 8px 15px;

			border-radius: 30px;

			color: white;

			font-weight: 600;

		}

		@media(max-width:768px) {

			.header {

				flex-direction: column;
				align-items: flex-start;

			}

			.table {

				display: block;
				overflow-x: auto;

			}

		}
	</style>

</head>

<body>

	<div class="circle"></div>
	<div class="circle"></div>

	<div class="container">

		<div class="card">

			<div class="header">

				<div>

					<h2>💰 Budget Management</h2>

					<p>
						View and manage all your monthly budgets.
					</p>

				</div>

				<div class="badge">

					Budget Records

				</div>

			</div>

			<table class="table">

				<thead>

					<tr>

						<th>Category</th>

						<th>Budget Amount</th>

						<th>Month</th>

						<th>Year</th>

						<th>Action</th>

					</tr>

				</thead>

				<tbody>

					<tr th:each="b : ${budgets}">

						<td th:text="${b.category.name}"></td>

						<td>
							₹ <span th:text="${b.monthlyBudget}"></span>
						</td>

						<td th:text="${b.month}"></td>

						<td th:text="${b.year}"></td>

						<td>

							<a th:href="@{/budget/delete/{id}(id=${b.id})}" class="delete-btn"
								onclick="return confirm('Are you sure you want to delete this Budget?')">

								🗑 Delete

							</a>

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</body>

</html>
